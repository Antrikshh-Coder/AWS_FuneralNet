version: "3.9"

services:

  mysql:
    image: mysql:8.4
    container_name: funeralnet-db

    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: funeralnet_db

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/sql:/docker-entrypoint-initdb.d

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile

    container_name: funeralnet-backend

    ports:
      - "5050:5001"

    env_file:
      - backend/.env

    depends_on:
      - mysql

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile

    container_name: funeralnet-frontend

    ports:
      - "8090:80"

    depends_on:
      - backend

volumes:
  mysql_data:
